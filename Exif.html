<h1>Les métadonnées EXIF</h1>

<img src="https://upload.wikimedia.org/wikipedia/commons/7/7c/Metadata.jpg">

<p>Les métadonnées EXIF sont des informations enregistrées automatiquement dans une photo numérique.</p>

<h2>Informations EXIF</h2>

<ol>
<li>Date de la photo</li>
<li>Appareil utilisé</li>
<li>Ouverture</li>
<li>Vitesse d'obturation</li>
<li>Localisation GPS</li>
</ol>
